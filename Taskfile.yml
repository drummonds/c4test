version: "3"

tasks:
  build:docs:
    desc: Render diagrams to docs/index.html
    cmds:
      - go run . diagrams docs

  build:
    desc: Build binary
    cmds:
      - go build -o c4test .

  fmt:
    desc: Format code
    cmds:
      - gofmt -w .

  vet:
    desc: Vet code
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  check:
    desc: Format, vet, and test
    cmds:
      - task: fmt
      - task: vet
      - task: test

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f c4test
      - rm -rf docs
